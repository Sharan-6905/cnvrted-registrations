<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#0B0B0B"/>
  <!-- Infinity lemniscate: left loop and right loop meeting at center (16,16) -->
  <!-- Left half: center (10,16), right half: center (22,16) -->
  <path
    d="M16,16
       C14.5,13.5 12.5,10 9,10
       C5,10 5,22 9,22
       C12.5,22 14.5,18.5 16,16
       C17.5,13.5 19.5,10 23,10
       C27,10 27,22 23,22
       C19.5,22 17.5,18.5 16,16 Z"
    fill="none"
    stroke="white"
    stroke-width="1.6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow pointing upper-right through center -->
  <polyline
    points="14.2,17.8 17.5,14.5 20.5,16.2"
    fill="none"
    stroke="white"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  <!-- Arrow pointing lower-left through center -->
  <polyline
    points="17.8,14.2 14.5,17.5 11.5,15.8"
    fill="none"
    stroke="white"
    stroke-width="1.4"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
